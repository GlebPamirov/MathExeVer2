<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GeoEditor Pro v3.5 — Segment Splitter</title>
    <style>
        :root { --accent: #0984e3; --panel: #f1f2f6; --danger: #d63031; }
        body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; background: #dfe6e9; margin: 0; padding: 20px; }
        .toolbar { background: var(--panel); padding: 10px; border-radius: 10px; display: flex; gap: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { padding: 8px 12px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        #canvas-container { position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        #code-output { margin-top: 15px; width: 800px; height: 60px; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; resize: none; }
        #edit-overlay { display: none; position: absolute; background: white; padding: 5px; border: 2px solid var(--accent); border-radius: 4px; z-index: 100; }
        .hint-text { margin-top: 10px; color: #636e72; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="toolbar" id="toolbar">
    <button class="btn active" data-mode="point">Точка (ЛКМ)</button>
    <button class="btn" data-mode="line">Линия (Тянуть)</button>
    <button class="btn" style="background: #00b894; color: white;" onclick="generateCode()">Экспорт кода</button>
</div>

<div id="canvas-container">
    <canvas id="geoCanvas" width="800" height="500"></canvas>
    <div id="edit-overlay">
        <input type="text" id="edit-input" style="width: 70px; text-align: center; border: 1px solid #ccc;">
    </div>
</div>

<div class="hint-text">ЛКМ: поставить/двигать | ПКМ: удалить | Двойной клик на подсвеченный центр: подписать отрезок</div>
<textarea id="code-output" readonly placeholder="Код для вставки в проект..."></textarea>

<script>
    const canvas = document.getElementById('geoCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('edit-overlay');
    const editInput = document.getElementById('edit-input');
    const output = document.getElementById('code-output');

    const GRID = 25;
    const SNAP_DIST = 12;
    const POINT_RADIUS = 2.5; // Уменьшено в 2 раза

    let mode = 'point';
    let elements = { points: [], lines: [] };
    let isDragging = false;
    let selectedPoint = null;
    let tempLine = null;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    canvas.oncontextmenu = (e) => e.preventDefault();

    document.getElementById('toolbar').addEventListener('click', (e) => {
        if (e.target.dataset.mode) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            mode = e.target.dataset.mode;
        }
    });

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('dblclick', handleDblClick);

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function calculateSnap(x, y) {
        const gx = Math.round(x / GRID) * GRID;
        const gy = Math.round(y / GRID) * GRID;
        if (Math.hypot(x - gx, y - gy) < SNAP_DIST) return { x: gx, y: gy, type: 'grid' };

        for (let l of elements.lines) {
            const p = getClosestPointOnSegment(x, y, l.p1.x, l.p1.y, l.p2.x, l.p2.y);
            if (Math.hypot(x - p.x, y - p.y) < 8) return { x: p.x, y: p.y, type: 'line', targetLine: l };
        }
        return { x, y, type: 'none' };
    }

    function getClosestPointOnSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return { x: x1, y: y1 };
        const t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
        const tClamp = Math.max(0, Math.min(1, t));
        return { x: x1 + tClamp * dx, y: y1 + tClamp * dy };
    }

    function splitLine(targetLine, newPoint) {
        const p1 = targetLine.p1;
        const p2 = targetLine.p2;
        // Удаляем старую линию
        elements.lines = elements.lines.filter(l => l !== targetLine);
        // Добавляем две новые
        elements.lines.push({ p1: p1, p2: newPoint, label: '' });
        elements.lines.push({ p1: newPoint, p2: p2, label: '' });
    }

    function handleMouseDown(e) {
        const {x, y} = getMousePos(e);
        
        if (e.button === 2) {
            const hitP = elements.points.find(p => Math.hypot(p.x - x, p.y - y) < 10);
            if (hitP) {
                elements.points = elements.points.filter(p => p !== hitP);
                elements.lines = elements.lines.filter(l => l.p1 !== hitP && l.p2 !== hitP);
                return;
            }
            elements.lines = elements.lines.filter(l => {
                const mid = { x: (l.p1.x+l.p2.x)/2, y: (l.p1.y+l.p2.y)/2 };
                return Math.hypot(mid.x - x, mid.y - y) > 15;
            });
            return;
        }

        const hitPoint = elements.points.find(p => Math.hypot(p.x - x, p.y - y) < 10);
        
        if (hitPoint) {
            selectedPoint = hitPoint;
            isDragging = true;
            if (mode === 'line') tempLine = { p1: hitPoint, x2: x, y2: y };
            overlay.style.display = 'none';
            return;
        }

        if (mode === 'point') {
            const snap = calculateSnap(x, y);
            const pName = alphabet[elements.points.length % alphabet.length];
            const newPoint = { x: snap.x, y: snap.y, name: pName, blink: (snap.type !== 'none') ? 1.0 : 0 };
            elements.points.push(newPoint);
            
            if (snap.type === 'line' && snap.targetLine) {
                splitLine(snap.targetLine, newPoint);
            }
        }
    }

    function handleMouseMove(e) {
        const {x, y} = getMousePos(e);
        if (isDragging && selectedPoint && mode === 'point') {
            const snap = calculateSnap(x, y);
            selectedPoint.x = snap.x;
            selectedPoint.y = snap.y;
            if (snap.type !== 'none') selectedPoint.blink = 1.0;
        }
        if (tempLine) { tempLine.x2 = x; tempLine.y2 = y; }
    }

    function handleMouseUp() {
        if (mode === 'line' && tempLine) {
            const hitPoint = elements.points.find(p => Math.hypot(p.x - tempLine.x2, p.y - tempLine.y2) < 10 && p !== tempLine.p1);
            if (hitPoint) elements.lines.push({ p1: tempLine.p1, p2: hitPoint, label: '' });
        }
        isDragging = false; selectedPoint = null; tempLine = null;
    }

    function handleDblClick(e) {
        const {x, y} = getMousePos(e);
        const hitP = elements.points.find(p => Math.hypot(p.x - x, p.y - y) < 10);
        if (hitP) return showEditor(hitP, x, y, 'name');

        const hitL = elements.lines.find(l => {
            const mid = { x: (l.p1.x+l.p2.x)/2, y: (l.p1.y+l.p2.y)/2 };
            return Math.hypot(mid.x - x, mid.y - y) < 15;
        });
        if (hitL) showEditor(hitL, x, y, 'label');
    }

    function showEditor(obj, x, y, field) {
        overlay.style.display = 'block';
        overlay.style.left = (x + 10) + 'px'; overlay.style.top = (y - 10) + 'px';
        editInput.value = obj[field];
        editInput.focus();
        editInput.onkeydown = (e) => {
            if (e.key === 'Enter') { obj[field] = editInput.value; overlay.style.display = 'none'; }
        };
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        elements.lines.forEach(l => {
            ctx.setLineDash([]); ctx.strokeStyle = '#2d3436'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(l.p1.x, l.p1.y); ctx.lineTo(l.p2.x, l.p2.y); ctx.stroke();
            
            const mid = { x: (l.p1.x+l.p2.x)/2, y: (l.p1.y+l.p2.y)/2 };
            
            // Подсветка поля для подписи
            ctx.fillStyle = 'rgba(9, 132, 227, 0.08)';
            ctx.beginPath(); ctx.arc(mid.x, mid.y, 10, 0, Math.PI*2); ctx.fill();

            if (l.label) {
                const ang = Math.atan2(l.p2.y - l.p1.y, l.p2.x - l.p1.x);
                ctx.fillStyle = '#0984e3'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                ctx.fillText(l.label, mid.x + Math.cos(ang + Math.PI/2)*15, mid.y + Math.sin(ang + Math.PI/2)*15 + 4);
            }
        });

        if (tempLine) {
            ctx.strokeStyle = '#0984e3'; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(tempLine.p1.x, tempLine.p1.y); ctx.lineTo(tempLine.x2, tempLine.y2); ctx.stroke();
        }

        elements.points.forEach(p => {
            if (p.blink > 0) {
                ctx.fillStyle = `rgba(9, 132, 227, ${p.blink * 0.2})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
                p.blink -= 0.05;
            }
            ctx.fillStyle = (selectedPoint === p) ? '#d63031' : '#2d3436';
            ctx.beginPath(); ctx.arc(p.x, p.y, POINT_RADIUS, 0, Math.PI * 2); ctx.fill();
            drawPointLabel(ctx, p);
        });

        requestAnimationFrame(draw);
    }

    function drawPointLabel(ctx, p) {
        let ox = 12, oy = -12;
        const attached = elements.lines.filter(l => l.p1 === p || l.p2 === p);
        if (attached.length > 0) {
            let sx = 0, sy = 0;
            attached.forEach(l => {
                const other = (l.p1 === p) ? l.p2 : l.p1;
                sx += (other.x - p.x); sy += (other.y - p.y);
            });
            const ang = Math.atan2(sy, sx) + Math.PI;
            ox = Math.cos(ang) * 15; oy = Math.sin(ang) * 15;
        }
        ctx.fillStyle = '#2d3436'; ctx.font = 'italic 14px "Times New Roman"'; ctx.textAlign = 'center';
        ctx.fillText(p.name, p.x + ox, p.y + oy + 4);
    }

    function drawGrid() {
        ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += GRID) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y < canvas.height; y += GRID) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
    }

    function generateCode() {
        let code = `ctx.lineWidth = 1.5; ctx.strokeStyle = '#2d3436';\n`;
        elements.lines.forEach(l => {
            code += `ctx.beginPath(); ctx.moveTo(${l.p1.x}, ${l.p1.y}); ctx.lineTo(${l.p2.x}, ${l.p2.y}); ctx.stroke();\n`;
            if(l.label) code += `ctx.fillText("${l.label}", ${(l.p1.x+l.p2.x)/2 + 5}, ${(l.p1.y+l.p2.y)/2 - 10});\n`;
        });
        elements.points.forEach(p => {
            code += `ctx.beginPath(); ctx.arc(${p.x}, ${p.y}, ${POINT_RADIUS}, 0, 6.28); ctx.fill();\n`;
            code += `ctx.fillText("${p.name}", ${p.x + 8}, ${p.y - 8});\n`;
        });
        output.value = code;
    }

    draw();
</script>
</body>
</html>
