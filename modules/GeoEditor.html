<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoEditor v7.9 — Angle Menu Fix</title>
    <style>
        :root { --accent: #0984e3; --panel: #ffffff; --shadow: rgba(0,0,0,0.2); }
        body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; background: #dfe6e9; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        .toolbar { background: var(--panel); padding: 10px; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 380px; z-index: 10; }
        .btn { padding: 6px 10px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        #canvas-container { position: relative; background: white; box-shadow: 0 10px 30px var(--shadow); border-radius: 8px; width: 400px; height: 300px; }
        canvas { display: block; background: #fff; cursor: crosshair; touch-action: none; }
        .context-menu { 
            display: none; position: absolute; background: white; border-radius: 8px; 
            padding: 10px; box-shadow: 0 8px 24px var(--shadow); z-index: 2000; 
            border: 1px solid #ddd; flex-direction: column; gap: 8px; min-width: 170px;
        }
        .menu-row { display: flex; align-items: center; justify-content: space-between; gap: 5px; font-size: 12px; }
        .btn-sm { padding: 4px 6px; font-size: 11px; flex: 1; border: 1px solid #eee; background: #f9f9f9; border-radius: 4px; cursor: pointer; }
        .menu-input { width: 60px; padding: 2px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" onclick="undo()">↩</button>
    <button class="btn" onclick="redo()">↪</button>
    <button class="btn" id="angle-mode-btn" onclick="toggleMode('angle')">📐 Угол</button>
    <button class="btn" id="eraser-btn" onclick="toggleMode('eraser')">🧼 Ластик</button>
    <button class="btn" style="margin-left:auto" onclick="clearAll()">Очистить</button>
</div>

<div id="canvas-container">
    <canvas id="geoCanvas"></canvas>
    <div id="master-menu" class="context-menu">
        <div id="menu-content"></div>
        <button class="btn" style="color:red; border-color:red; width:100%; margin-top:5px" onclick="deleteTarget()">Удалить</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('geoCanvas'), ctx = canvas.getContext('2d');
    const masterMenu = document.getElementById('master-menu');
    const GRID = 25, SNAP_DIST = 15, POINT_RADIUS = 4;
    
    let elements = { points: [], lines: [], angles: [] }, history = [], hStep = -1;
    let isDrawing = false, isDragging = false, activePoint = null, menuTarget = null;
    let startPos = {x:0, y:0}, lastPos = {x:0, y:0}, tapTimer = null;
    let lastTapTime = 0, currentMode = null, selectedForAngle = [];
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", greeks = ["α", "β", "γ", "δ", "φ"];

    function init() { canvas.width = 400; canvas.height = 300; save(); requestAnimationFrame(draw); }

    function save() {
        if (hStep < history.length - 1) history = history.slice(0, hStep + 1);
        history.push(JSON.stringify(elements)); hStep++;
    }
    function undo() { if(hStep > 0) { hStep--; elements = JSON.parse(history[hStep]); closeMenu(); } }
    function redo() { if(hStep < history.length - 1) { hStep++; elements = JSON.parse(history[hStep]); closeMenu(); } }
    function clearAll() { if(confirm("Удалить всё?")) { elements = {points:[], lines:[], angles:[]}; save(); closeMenu(); } }

    function toggleMode(mode) {
        currentMode = (currentMode === mode) ? null : mode;
        selectedForAngle = [];
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        if(currentMode) document.getElementById(mode + '-mode-btn').classList.add('active');
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const c = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
        return { x: c.clientX - rect.left, y: c.clientY - rect.top };
    }

    function getDistToLine(p, l) {
        const p1 = elements.points.find(pt=>pt.id===l.p1id), p2 = elements.points.find(pt=>pt.id===l.p2id);
        if(!p1 || !p2) return 999;
        const L2 = (p2.x-p1.x)**2 + (p2.y-p1.y)**2;
        if(L2 === 0) return Math.hypot(p.x-p1.x, p.y-p1.y);
        let t = Math.max(0, Math.min(1, ((p.x - p1.x) * (p2.x - p1.x) + (p.y - p1.y) * (p2.y - p1.y)) / L2));
        return Math.hypot(p.x - (p1.x + t*(p2.x-p1.x)), p.y - (p1.y + t*(p2.y-p1.y)));
    }

    function handleStart(e) {
        const pos = getPos(e); startPos = pos; lastPos = pos;
        
        // 1. Поиск угла (смещенная зона на биссектрисе)
        const hitA = elements.angles.find(a => {
            const p1 = elements.points.find(pt=>pt.id===a.p1), p2 = elements.points.find(pt=>pt.id===a.p2), p3 = elements.points.find(pt=>pt.id===a.p3);
            if(!p2 || !p1 || !p3) return false;
            let a1 = Math.atan2(p1.y-p2.y, p1.x-p2.x), a3 = Math.atan2(p3.y-p2.y, p3.x-p2.x);
            let diff = (a3 - a1 + Math.PI * 2) % (Math.PI * 2);
            if (diff > Math.PI) { [a1, a3] = [a3, a1]; diff = Math.PI * 2 - diff; }
            const midA = a1 + diff/2;
            const checkPoint = { x: p2.x + Math.cos(midA)*20, y: p2.y + Math.sin(midA)*20 };
            return Math.hypot(pos.x - checkPoint.x, pos.y - checkPoint.y) < 18;
        });

        // 2. Поиск точки (уменьшенный радиус)
        const hitP = elements.points.find(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 12);
        
        if (currentMode === 'angle' && hitP) {
            if (!selectedForAngle.includes(hitP.id)) selectedForAngle.push(hitP.id);
            if (selectedForAngle.length === 3) {
                elements.angles.push({ id: Math.random(), p1: selectedForAngle[0], p2: selectedForAngle[1], p3: selectedForAngle[2], arcCount: 1, greek: '' });
                save(); toggleMode('angle');
            }
            return;
        }

        const now = Date.now();
        if (now - lastTapTime < 350) {
            if (hitA) { openMenu(hitA, pos, 'angle'); return; }
            if (hitP) { openMenu(hitP, pos, 'point'); return; }
            const hitL = elements.lines.find(l => getDistToLine(pos, l) < 15);
            if (hitL) { openMenu(hitL, pos, 'line'); return; }
        }
        lastTapTime = now;
        closeMenu();

        activePoint = hitP;
        if (currentMode === 'eraser' && activePoint) { menuTarget = activePoint; deleteTarget(); return; }

        tapTimer = setTimeout(() => {
            if (Math.hypot(lastPos.x - startPos.x, lastPos.y - startPos.y) < 8) {
                if (!activePoint) { 
                    // Создание точки с учетом пересечений
                    const inter = findIntersection(startPos);
                    if (inter) {
                        activePoint = { ...inter, id: Math.random(), isHollow: false, name: alphabet[elements.points.length % alphabet.length] };
                        elements.points.push(activePoint);
                    } else {
                        activePoint = { x: Math.round(startPos.x/GRID)*GRID, y: Math.round(startPos.y/GRID)*GRID, id: Math.random(), parents: [], isHollow: false, name: alphabet[elements.points.length % alphabet.length] };
                        elements.points.push(activePoint);
                    }
                    save(); 
                } else isDragging = true;
            }
        }, 300);
    }

    function findIntersection(pos) {
        for (let i = 0; i < elements.lines.length; i++) {
            for (let j = i + 1; j < elements.lines.length; j++) {
                const l1 = elements.lines[i], l2 = elements.lines[j];
                const p1 = elements.points.find(p=>p.id===l1.p1id), p2 = elements.points.find(p=>p.id===l1.p2id);
                const p3 = elements.points.find(p=>p.id===l2.p1id), p4 = elements.points.find(p=>p.id===l2.p2id);
                if(!p1||!p2||!p3||!p4) continue;
                const den = (p1.x - p2.x)*(p3.y - p4.y) - (p1.y - p2.y)*(p3.x - p4.x);
                if (Math.abs(den) < 1) continue;
                const inter = {
                    x: ((p1.x*p2.y - p1.y*p2.x)*(p3.x - p4.x) - (p1.x - p2.x)*(p3.x*p4.y - p3.y*p4.x)) / den,
                    y: ((p1.x*p2.y - p1.y*p2.x)*(p3.y - p4.y) - (p1.y - p2.y)*(p3.x*p4.y - p3.y*p4.x)) / den
                };
                if (Math.hypot(pos.x - inter.x, pos.y - inter.y) < SNAP_DIST) return { ...inter, parents: [{lid:l1.id}, {lid:l2.id}] };
            }
        }
        return null;
    }

    function handleMove(e) {
        const pos = getPos(e); lastPos = pos;
        if (Math.hypot(pos.x - startPos.x, pos.y - startPos.y) > 10) clearTimeout(tapTimer);
        if (isDragging && activePoint) {
            activePoint.x = pos.x; activePoint.y = pos.y;
            // Обновление зависимых точек (пересечений)
            elements.points.forEach(p => {
                if (p.parents && p.parents.length === 2) {
                    const l1 = elements.lines.find(l => l.id === p.parents[0].lid), l2 = elements.lines.find(l => l.id === p.parents[1].lid);
                    if(l1 && l2) {
                        const p1 = elements.points.find(pt=>pt.id===l1.p1id), p2 = elements.points.find(pt=>pt.id===l1.p2id);
                        const p3 = elements.points.find(pt=>pt.id===l2.p1id), p4 = elements.points.find(pt=>pt.id===l2.p2id);
                        const den = (p1.x - p2.x)*(p3.y - p4.y) - (p1.y - p2.y)*(p3.x - p4.x);
                        if(Math.abs(den) > 1) {
                            p.x = ((p1.x*p2.y - p1.y*p2.x)*(p3.x - p4.x) - (p1.x - p2.x)*(p3.x*p4.y - p3.y*p4.x)) / den;
                            p.y = ((p1.x*p2.y - p1.y*p2.x)*(p3.y - p4.y) - (p1.y - p2.y)*(p3.x*p4.y - p3.y*p4.x)) / den;
                        }
                    }
                }
            });
        }
    }

    function handleEnd() {
        clearTimeout(tapTimer);
        if (isDragging && activePoint) {
            const target = elements.points.find(p => p.id !== activePoint.id && Math.hypot(p.x - activePoint.x, p.y - activePoint.y) < 15);
            if (target) {
                elements.lines.forEach(l => { if (l.p1id === activePoint.id) l.p1id = target.id; if (l.p2id === activePoint.id) l.p2id = target.id; });
                elements.angles.forEach(a => { if (a.p1 === activePoint.id) a.p1 = target.id; if (a.p2 === activePoint.id) a.p2 = target.id; if (a.p3 === activePoint.id) a.p3 = target.id; });
                elements.points = elements.points.filter(p => p.id !== activePoint.id);
            }
            save();
        }
        if (activePoint && !isDragging && Math.hypot(lastPos.x - startPos.x, lastPos.y - startPos.y) > 20) {
            const inter = findIntersection(lastPos);
            let target = inter ? { ...inter, id: Math.random(), isHollow: false, name: alphabet[elements.points.length % alphabet.length] } : { x: Math.round(lastPos.x/GRID)*GRID, y: Math.round(lastPos.y/GRID)*GRID, id: Math.random(), parents: [], isHollow: false, name: alphabet[elements.points.length % alphabet.length] };
            const existing = elements.points.find(p => Math.hypot(p.x - target.x, p.y - target.y) < 15);
            if (existing) target = existing; else elements.points.push(target);
            
            if (target.id !== activePoint.id) {
                elements.lines.push({ id: Math.random(), p1id: activePoint.id, p2id: target.id, tick: null, isDashed: false, isBold: false, name: '' });
                save();
            }
        }
        isDrawing = isDragging = false; activePoint = null;
    }

    function openMenu(obj, pos, type) {
        menuTarget = obj;
        const container = document.getElementById('menu-content');
        container.innerHTML = '';
        if (type === 'point') {
            container.innerHTML = `<div class="menu-row">Имя: <input type="text" value="${obj.name}" class="menu-input" oninput="menuTarget.name=this.value"></div>
            <div class="menu-row"><button class="btn-sm" onclick="menuTarget.isHollow=!menuTarget.isHollow;save();">Выколоть</button></div>`;
        } else if (type === 'angle') {
            container.innerHTML = `<div class="menu-row">Буква: ${greeks.map(g => `<button class="btn-sm" onclick="menuTarget.greek='${g}';save();">${g}</button>`).join('')}</div>
            <div class="menu-row">Дуги: <button class="btn-sm" onclick="menuTarget.arcCount=1;save();">1</button><button class="btn-sm" onclick="menuTarget.arcCount=2;save();">2</button><button class="btn-sm" onclick="menuTarget.arcCount=3;save();">3</button></div>`;
        } else {
            container.innerHTML = `<div class="menu-row">Имя: <input type="text" value="${obj.name||''}" class="menu-input" oninput="menuTarget.name=this.value"></div>
            <div class="menu-row"><button class="btn-sm" onclick="menuTarget.isDashed=!menuTarget.isDashed;save();">Пунктир</button><button class="btn-sm" onclick="menuTarget.isBold=!menuTarget.isBold;save();">Жирная</button></div>
            <div class="menu-row">Засечки: <button class="btn-sm" onclick="setTick('I')">I</button><button class="btn-sm" onclick="setTick('II')">II</button><button class="btn-sm" onclick="setTick('Z')">Z</button></div>`;
        }
        masterMenu.style.display = 'flex'; masterMenu.style.left = Math.min(pos.x, 220)+'px'; masterMenu.style.top = Math.min(pos.y, 180)+'px';
    }

    function setTick(t) { menuTarget.tick = (menuTarget.tick === t) ? null : t; save(); }
    function closeMenu() { masterMenu.style.display = 'none'; menuTarget = null; }
    function deleteTarget() {
        if (menuTarget.p1id) elements.lines = elements.lines.filter(l => l.id !== menuTarget.id);
        else if (menuTarget.arcCount) elements.angles = elements.angles.filter(a => a.id !== menuTarget.id);
        else {
            elements.lines = elements.lines.filter(l => l.p1id !== menuTarget.id && l.p2id !== menuTarget.id);
            elements.points = elements.points.filter(p => p.id !== menuTarget.id);
            elements.angles = elements.angles.filter(a => a.p1!==menuTarget.id && a.p2!==menuTarget.id && a.p3!==menuTarget.id);
        }
        save(); closeMenu();
    }

    canvas.addEventListener('mousedown', handleStart); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e); }, {passive: false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
    canvas.addEventListener('touchend', handleEnd);

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath(); ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
        for(let i=0; i<=canvas.width; i+=GRID) { ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); }
        for(let i=0; i<=canvas.height; i+=GRID) { ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); }
        ctx.stroke();

        elements.angles.forEach(ang => {
            const p1 = elements.points.find(p=>p.id===ang.p1), p2 = elements.points.find(p=>p.id===ang.p2), p3 = elements.points.find(p=>p.id===ang.p3);
            if (p1 && p2 && p3) {
                let a1 = Math.atan2(p1.y-p2.y, p1.x-p2.x), a3 = Math.atan2(p3.y-p2.y, p3.x-p2.x);
                let diff = (a3 - a1 + Math.PI * 2) % (Math.PI * 2);
                if (diff > Math.PI) { [a1, a3] = [a3, a1]; diff = Math.PI * 2 - diff; }
                const midA = a1 + diff/2;
                ctx.strokeStyle = '#0984e3'; ctx.lineWidth = 1.5;
                if (Math.abs(diff - Math.PI/2) < 0.1) {
                    const d = 15; ctx.beginPath();
                    ctx.moveTo(p2.x + Math.cos(a1)*d, p2.y + Math.sin(a1)*d);
                    ctx.lineTo(p2.x + Math.cos(a1)*d + Math.cos(a3)*d, p2.y + Math.sin(a1)*d + Math.sin(a3)*d);
                    ctx.lineTo(p2.x + Math.cos(a3)*d, p2.y + Math.sin(a3)*d);
                    ctx.stroke();
                } else {
                    for(let n=0; n<ang.arcCount; n++) {
                        ctx.beginPath(); ctx.arc(p2.x, p2.y, 18 + n*4, a1, a3, false); ctx.stroke();
                    }
                }
                if(ang.greek) {
                    ctx.fillStyle = '#0984e3'; ctx.font = '16px serif';
                    ctx.fillText(ang.greek, p2.x + Math.cos(midA)*38 - 4, p2.y + Math.sin(midA)*38 + 5);
                }
            }
        });

        elements.lines.forEach(l => {
            const p1 = elements.points.find(p=>p.id===l.p1id), p2 = elements.points.find(p=>p.id===l.p2id);
            if (p1 && p2) {
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = '#2d3436'; ctx.lineWidth = l.isBold ? 4 : 1.5;
                if(l.isDashed) ctx.setLineDash([5,5]); else ctx.setLineDash([]);
                ctx.stroke(); ctx.setLineDash([]);
                if(l.name) { ctx.fillStyle = '#0984e3'; ctx.fillText(l.name, (p1.x+p2.x)/2+5, (p1.y+p2.y)/2-5); }
                if (l.tick) {
                    const m = {x: (p1.x+p2.x)/2, y: (p1.y+p2.y)/2}, ang = Math.atan2(p2.y-p1.y, p2.x-p1.x) + Math.PI/2;
                    ctx.beginPath(); const offs = l.tick==='I'?[0]:(l.tick==='II'?[-3,3]:[-4,0,4]);
                    offs.forEach(o => {
                        const ox = Math.cos(ang-Math.PI/2)*o, oy = Math.sin(ang-Math.PI/2)*o;
                        ctx.moveTo(m.x+ox-Math.cos(ang)*6, m.y+oy-Math.sin(ang)*6); ctx.lineTo(m.x+ox+Math.cos(ang)*6, m.y+oy+Math.sin(ang)*6);
                    });
                    ctx.stroke();
                }
            }
        });

        elements.points.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, POINT_RADIUS, 0, 7);
            ctx.fillStyle = selectedForAngle.includes(p.id) ? '#ff7675' : (p.parents.length === 2 ? '#e67e22' : '#2d3436');
            if(p.isHollow) { ctx.fillStyle = 'white'; ctx.fill(); ctx.stroke(); } else ctx.fill();
            ctx.fillStyle = '#2d3436'; ctx.font = 'italic 14px serif';
            ctx.fillText(p.name, p.x+8, p.y-8);
        });

        if(activePoint && !isDragging) {
            ctx.beginPath(); ctx.moveTo(activePoint.x, activePoint.y); ctx.lineTo(lastPos.x, lastPos.y);
            ctx.strokeStyle = '#0984e3'; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
        }
        requestAnimationFrame(draw);
    }
    init();
</script>
</body>
</html>
