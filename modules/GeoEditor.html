<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoEditor v4.5 — Multi-Touch</title>
    <style>
        :root { --accent: #0984e3; --panel: #f1f2f6; --text: #2d3436; --danger: #d63031; }
        body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; background: #dfe6e9; margin: 0; padding: 10px; overflow-x: hidden; }
        .toolbar { background: var(--panel); padding: 10px; border-radius: 10px; display: flex; gap: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; justify-content: center; }
        .btn { padding: 8px 12px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 5px; font-size: 14px; touch-action: manipulation; }
        .btn.active { background: var(--danger); color: white; border-color: var(--danger); }
        #canvas-container { position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; touch-action: none; }
        canvas { display: block; cursor: crosshair; touch-action: none; }
        #code-output { margin-top: 15px; width: 100%; max-width: 800px; height: 60px; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; resize: none; box-sizing: border-box; }
        #edit-overlay { display: none; position: absolute; background: white; padding: 5px; border: 2px solid var(--accent); border-radius: 4px; z-index: 100; }
        .controls-hint { margin-top: 10px; font-size: 0.75rem; color: #636e72; text-align: center; line-height: 1.4; max-width: 400px; }
    </style>
</head>
<body>

<div class="toolbar">
    <div style="font-weight: bold; padding: 8px; color: var(--accent);">GeoEditor v4.5</div>
    <button class="btn" id="eraser-mode">Ластик: ВЫКЛ</button>
    <button class="btn" style="background: #00b894; color: white; border: none;" onclick="generateCode()">Экспорт кода</button>
</div>

<div id="canvas-container">
    <canvas id="geoCanvas"></canvas>
    <div id="edit-overlay">
        <input type="text" id="edit-input" style="width: 80px; text-align: center; border: 1px solid #ccc;">
    </div>
</div>

<div class="controls-hint">
    <b>ПК:</b> ЛКМ (тянуть) - линия, ПКМ - удалить, Двойной клик - точка/текст.<br>
    <b>Смартфон:</b> Включите "Ластик" для удаления. Двойной тап - точка/текст.
</div>

<textarea id="code-output" readonly placeholder="Готовый код появится здесь..."></textarea>

<script>
    const canvas = document.getElementById('geoCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('edit-overlay');
    const editInput = document.getElementById('edit-input');
    const output = document.getElementById('code-output');
    const eraserBtn = document.getElementById('eraser-mode');

    // Настройки сетки и точности
    const GRID = 25;
    const SNAP_DIST = 15;
    const POINT_RADIUS = 2.5;
    const TOUCH_RADIUS = 25; // Увеличенная зона для пальца

    let elements = { points: [], lines: [], segments: [] };
    let isDrawingLine = false;
    let isEraserActive = false;
    let dragStartPoint = null;
    let lastMousePos = { x: 0, y: 0 };
    let lastTapTime = 0;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    // Адаптация размера холста
    function resize() {
        const size = Math.min(window.innerWidth - 40, 800);
        canvas.width = size;
        canvas.height = size * 0.625;
    }
    window.addEventListener('resize', resize);
    resize();

    // Блокировка контекстного меню
    canvas.oncontextmenu = (e) => e.preventDefault();

    // Переключатель ластика
    eraserBtn.onclick = () => {
        isEraserActive = !isEraserActive;
        eraserBtn.classList.toggle('active', isEraserActive);
        eraserBtn.textContent = isEraserActive ? "Ластик: ВКЛ" : "Ластик: ВЫКЛ";
    };

    // УНИВЕРСАЛЬНЫЕ ОБРАБОТЧИКИ
    function getEventPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    const startAction = (e) => {
        if (e.type === 'touchstart') e.preventDefault();
        const pos = getEventPos(e);
        const {x, y} = pos;
        lastMousePos = pos;

        // Логика удаления (ПКМ или режим ластика)
        if (e.button === 2 || isEraserActive) {
            elements.points = elements.points.filter(p => Math.hypot(p.x - x, p.y - y) > TOUCH_RADIUS);
            return;
        }

        // Начало рисования линии
        const hitPoint = elements.points.find(p => Math.hypot(p.x - x, p.y - y) < TOUCH_RADIUS);
        if (hitPoint) {
            isDrawingLine = true;
            dragStartPoint = hitPoint;
        }
    };

    const moveAction = (e) => {
        if (isDrawingLine) {
            lastMousePos = getEventPos(e);
        }
    };

    const endAction = (e) => {
        if (isDrawingLine && dragStartPoint) {
            const hitPoint = elements.points.find(p => Math.hypot(p.x - lastMousePos.x, p.y - lastMousePos.y) < TOUCH_RADIUS && p !== dragStartPoint);
            if (hitPoint) {
                // Проверка на дубликат линии
                const exists = elements.lines.some(l => (l.p1 === dragStartPoint && l.p2 === hitPoint) || (l.p1 === hitPoint && l.p2 === dragStartPoint));
                if (!exists) elements.lines.push({ p1: dragStartPoint, p2: hitPoint });
            }
        }
        isDrawingLine = false;
        dragStartPoint = null;
    };

    // Двойной клик / Тап
    const handleDblClick = (e) => {
        const {x, y} = getEventPos(e);
        
        const hitSeg = findSegmentAt(x, y);
        if (hitSeg) return showEditor(hitSeg, x, y);

        const hitPoint = elements.points.find(p => Math.hypot(p.x - x, p.y - y) < TOUCH_RADIUS);
        if (hitPoint) return showEditor(hitPoint, x, y, 'name');

        const snap = calculateSnap(x, y);
        const pName = alphabet[elements.points.length % alphabet.length];
        elements.points.push({ x: snap.x, y: snap.y, name: pName, blink: 1.0 });
    };

    // Слушатели событий
    canvas.addEventListener('mousedown', startAction);
    canvas.addEventListener('touchstart', startAction, {passive: false});
    window.addEventListener('mousemove', moveAction);
    window.addEventListener('touchmove', moveAction, {passive: false});
    window.addEventListener('mouseup', endAction);
    window.addEventListener('touchend', endAction);
    canvas.addEventListener('dblclick', handleDblClick);

    // Эмуляция dblclick для тача
    canvas.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTapTime < 300) {
            handleDblClick(e);
        }
        lastTapTime = now;
    });

    function calculateSnap(x, y) {
        const gx = Math.round(x / GRID) * GRID;
        const gy = Math.round(y / GRID) * GRID;
        if (Math.hypot(x - gx, y - gy) < SNAP_DIST) return { x: gx, y: gy };

        for (let l of elements.lines) {
            const p = getClosestPointOnSegment(x, y, l.p1.x, l.p1.y, l.p2.x, l.p2.y);
            if (Math.hypot(x - p.x, y - p.y) < 10) return { x: p.x, y: p.y };
        }
        return { x, y };
    }

    function getClosestPointOnSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        if (dx === 0 && dy === 0) return { x: x1, y: y1 };
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
        return { x: x1 + t * dx, y: y1 + t * dy };
    }

    function findSegmentAt(x, y) {
        return elements.segments.find(s => Math.hypot(s.midX - x, s.midY - y) < 20);
    }

    function showEditor(obj, x, y, field = 'label') {
        overlay.style.display = 'block';
        overlay.style.left = Math.min(x + 10, canvas.width - 90) + 'px'; 
        overlay.style.top = Math.max(y - 40, 10) + 'px';
        editInput.value = obj[field] || '';
        editInput.focus();
        editInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                obj[field] = editInput.value;
                overlay.style.display = 'none';
            }
        };
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        const currentSegments = [];

        elements.lines.forEach(line => {
            ctx.setLineDash([]); ctx.strokeStyle = '#2d3436'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(line.p1.x, line.p1.y); ctx.lineTo(line.p2.x, line.p2.y); ctx.stroke();

            let ptsOnLine = elements.points.filter(p => {
                const d = getClosestPointOnSegment(p.x, p.y, line.p1.x, line.p1.y, line.p2.x, line.p2.y);
                return Math.hypot(p.x - d.x, p.y - d.y) < 1;
            });

            ptsOnLine.sort((a, b) => Math.hypot(a.x - line.p1.x, a.y - line.p1.y) - Math.hypot(b.x - line.p1.x, b.y - line.p1.y));

            for (let i = 0; i < ptsOnLine.length - 1; i++) {
                const s1 = ptsOnLine[i], s2 = ptsOnLine[i+1];
                const mx = (s1.x + s2.x) / 2, my = (s1.y + s2.y) / 2;
                const id = `seg_${s1.x}_${s1.y}_${s2.x}_${s2.y}`;
                
                let segData = elements.segments.find(s => s.id === id);
                if (!segData) { segData = { id: id, label: '' }; elements.segments.push(segData); }
                segData.midX = mx; segData.midY = my;
                currentSegments.push(segData);

                ctx.fillStyle = 'rgba(9, 132, 227, 0.15)';
                ctx.beginPath(); ctx.arc(mx, my, 10, 0, 7); ctx.fill();

                if (segData.label) {
                    ctx.fillStyle = '#0984e3'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(segData.label, mx, my - 12);
                }
            }
        });

        if (isDrawingLine && dragStartPoint) {
            ctx.strokeStyle = '#0984e3'; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(dragStartPoint.x, dragStartPoint.y); ctx.lineTo(lastMousePos.x, lastMousePos.y); ctx.stroke();
        }

        elements.points.forEach(p => {
            if (p.blink > 0) {
                ctx.fillStyle = `rgba(9, 132, 227, ${p.blink * 0.2})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, 7); ctx.fill();
                p.blink -= 0.04;
            }
            ctx.fillStyle = (dragStartPoint === p) ? '#d63031' : '#2d3436';
            ctx.beginPath(); ctx.arc(p.x, p.y, POINT_RADIUS, 0, 7); ctx.fill();
            ctx.font = 'italic 13px "Times New Roman"';
            ctx.fillText(p.name, p.x + 8, p.y - 8);
        });

        requestAnimationFrame(draw);
    }

    function drawGrid() {
        ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += GRID) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += GRID) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
    }

    function generateCode() {
        let code = `ctx.lineWidth = 1.5; ctx.strokeStyle = '#2d3436';\n`;
        elements.lines.forEach(l => {
            code += `ctx.beginPath(); ctx.moveTo(${l.p1.x.toFixed(1)}, ${l.p1.y.toFixed(1)}); ctx.lineTo(${l.p2.x.toFixed(1)}, ${l.p2.y.toFixed(1)}); ctx.stroke();\n`;
        });
        elements.segments.forEach(s => {
            if(s.label) code += `ctx.fillText("${s.label}", ${s.midX.toFixed(1)}, ${s.midY.toFixed(1)});\n`;
        });
        elements.points.forEach(p => {
            code += `ctx.beginPath(); ctx.arc(${p.x}, ${p.y}, 2, 0, 6.28); ctx.fill();\n`;
            code += `ctx.fillText("${p.name}", ${p.x + 5}, ${p.y - 5});\n`;
        });
        output.value = code;
    }

    draw();
</script>
</body>
</html>
