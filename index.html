<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный тренажер v2.0</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], processEscapes: true },
            options: { renderAtStart: false },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>

    <style>
        :root { --bg: #f4f7f6; --accent: #0984e3; --white: #ffffff; --text: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .app-card { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        .hidden { display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #636e72; }
        select, input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: #ecf0f1; color: var(--text); border: 1px solid #bdc3c7; }
		.btn-opt {
			/* Другие ваши свойства (padding, border и т.д.) */
			font-size: 1.2rem; /* Увеличивает шрифт (по умолчанию обычно 1rem) */
			font-weight: 500;   /* Можно добавить жирности для четкости */
			padding: 15px 20px; /* Советую также увеличить отступы, чтобы кнопка не была тесной */
			min-height: 60px;   /* Поможет, если в ответах будут длинные формулы */
		}
        .btn-opt:hover { background: #dfe6e9; }
    </style>
</head>
<body>

<div class="app-card" id="main-container">
    <section id="auth-section">
        <h2 id="auth-title">Авторизуйся для выполнения заданий</h2>
        <input type="text" id="user-last-name" placeholder="Фамилия" style="margin-bottom:10px">
        <input type="text" id="user-first-name" placeholder="Имя">
        <button class="btn" id="login-btn">Войти</button>
    </section>

    <section id="menu-section" class="hidden">
        <h2>Настройка занятия</h2>
        <div class="form-group"><label>Предмет</label><select id="select-subject"></select></div>
        <div class="form-group"><label>Класс</label><select id="select-grade" disabled></select></div>
        <div class="form-group"><label>Тема</label><select id="select-topic" disabled></select></div>
        <button class="btn" id="start-btn">Начать</button>
    </section>

    <section id="game-section" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span id="player-display" style="font-weight: bold; color: var(--accent);"></span>
            <span id="progress-text" style="font-size: 0.9em; color: #636e72;"></span>
        </div>
        <div style="width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 25px;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: var(--accent); border-radius: 3px; transition: 0.3s;"></div>
        </div>


		<div id="graph-container"></div>


        <div id="task-area">
            <div id="equation-text" style="font-size: 1.5em; text-align: center; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px;"></div>
            <div id="options-grid" class="mode-grid"></div>
        </div>
        
        <div id="feedback-container" class="hidden" style="margin-top: 20px; padding: 15px; border-radius: 8px;">
            <strong id="feedback-title"></strong>
            <p id="feedback-text" style="margin-top: 5px; line-height: 1.4;"></p>
            <button class="btn" id="next-q-btn" style="display: none; background: var(--text);">Далее</button>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <button id="hint-trigger" style="background: none; border: none; color: #b2bec3; cursor: pointer; text-decoration: underline;">Мне нужна подсказка</button>
            <p id="hint-content" class="hidden" style="margin-top: 10px; color: #d63031; font-style: italic;"></p>
        </div>
    </section>
</div>

<script src="modules/graph_module.js"></script>
<script src="modules/report_generator.js"></script>
<script src="modules/db_connector.js"></script>
<script src="modules/single_choice_2.js"></script>

	<script src="themes_and_tasks/geometry_8_angles.js"></script>
    <script src="themes_and_tasks/algebra_8_equations.js"></script>
	<script src="themes_and_tasks/algebra_10_trigonometry.js"></script>
	<script src="themes_and_tasks/algebra_11_log_equations.js"></script>
	<script src="themes_and_tasks/algebra_8_linear_inequalities.js"></script>
	<script src="themes_and_tasks/algebra_8_linear_inequalities_system.js"></script>
	<script src="themes_and_tasks/vpr_math_8_var2.js"></script>
	<script src="themes_and_tasks/vpr_math_8_var1.js"></script>
	<script src="themes_and_tasks/algebra_11_trigonometry_values_11_13042026.js"></script>
	<script src="themes_and_tasks/EGE_math_base_var_1_13042026.js"></script>
	
<script src="app.js"></script>


</body>
</html>
